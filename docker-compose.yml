version: '3.9'

services:
  customer:
    build:
      context: ./Customer
      dockerfile: Dockerfile
    container_name: customer-service
    ports:
      - "8001:8080"
    environment:
      SPRING_APPLICATION_NAME: customer-service
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: "true"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  cart:
    build:
      context: ./cart
      dockerfile: Dockerfile
    container_name: cart-service
    ports:
      - "8002:8080"
    environment:
      SPRING_APPLICATION_NAME: cart-service
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: "true"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  menu:
    build:
      context: ./menu
      dockerfile: Dockerfile
    container_name: menu-service
    ports:
      - "8003:8080"
    environment:
      SPRING_APPLICATION_NAME: menu-service
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: "true"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  app-network:
    driver: bridge
