spring:
  application:
    name: gateway
  cloud:
    gateway:
      mvc:
        routes:
            - id: customer-service
              uri: lb://CUSTOMER
              predicates:
                - Path=/api/v1/customers/**
            - id: menu-service
              uri: lb://MENU-AND-CATALOG
              predicates:
                - Path=/api/v1/menu/**
            - id: cart-service
              uri: lb://CART
              predicates:
                - Path=/api/v1/cart/**
            - id: order-service
              uri: lb://ORDER
              predicates:
                - Path=/api/v1/orders/**
            - id: payment-service
              uri: lb://PAYMENT
              predicates:
                - Path=/api/v1/payments/**
            - id: kitchen-service
              uri: lb://KITCHEN
              predicates:
                - Path=/api/v1/kitchen/**
            - id: inventory-service
              uri: lb://INVENTORY
              predicates:
                - Path=/api/v1/inventory/**
            - id: delivery-service
              uri: lb://DELIVERY
              predicates:
                - Path=/api/v1/deliveries/**
            - id: notification-service
              uri:
              lb://NOTIFICATIONpredicates:
                  - Path=/api/v1/notifications/**
server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

kind: Application