spring:
  application:
    name: order-service

  datasource:
    url: jdbc:mysql://localhost:3306/order_db?createDatabaseIfNotExist=true
    username: root
    password: 159753
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true



server:
  port: 8085

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    enabled: false

resilience4j:
  retry:
    instances:
      cart-service:
        max-attempts: 3
        wait-duration: 500ms

      inventory-service:
        max-attempts: 3
        wait-duration: 500ms

      payment-service:
        max-attempts: 2
        wait-duration: 1000ms

  timelimiter:
    instances:
      cart-service:
        timeout-duration: 3s

      inventory-service:
        timeout-duration: 3s

      payment-service:
        timeout-duration: 10s
app:
  jwt:
    secret: ${JWT_SECRET:hunger-killer-secret-key-must-be-at-least-256-bits-long-for-security-purposes-12345}
    expiration: 86400000
  kafka:
    topics:
      order-placed: order.placed
      kitchen-status: kitchen.status
      delivery-status: delivery.status
      payment-confirmed: payment.confirmed
  order:
    delivery-fee: 5.00

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
