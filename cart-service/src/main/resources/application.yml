spring:
  application:
    name: cart-service

  datasource:
    url: jdbc:mysql://localhost:3306/cart_db?createDatabaseIfNotExist=true
    username: root
    password: 159753
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

app:
  jwt:
    secret: ${JWT_SECRET:hunger-killer-secret-key-must-be-at-least-256-bits-long-for-security-purposes-12345}
    expiration: 86400000

resilience4j:
  circuitbreaker:
    instances:
      menu-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
  retry:
    instances:
      menu-service:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      menu-service:
        timeoutDuration: 3s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/cart_db
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

app:
  jwt:
    secret: ${JWT_SECRET}
